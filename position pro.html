<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>positioning project</title>
    <style>
        div {
            right: 30px;
            border: 3px solid rgb(7, 60, 7);
        }
        div.absolute {
            position: absolute;
            left: 50px;
            border: 3px solid palevioletred;
        }
        div.relative {
            position: relative;
            left: 100px;
            border: 3px solid purple;
        }
        div.fixed {
            position: fixed;
            top: 0;
            right: 20px;
            width: 300px;
            border: 3px solid rgb(21, 21, 94);
        }
        div.sticky {
            position: sticky;
            top: 1px;
            left: 20px;
            width: 100px;
            border: 3px solid rgb(174, 132, 80);
        }
    </style>
</head>
</style>
<body>
    <h2>POSITIONING</h2>
    <div>
        DIV with no position property
    </div>
    <div class="sticky">
        DIV with sticky position property
    </div>
    <div class="relative">
        This div element has position: relative;
    </div class="absolute">
    Absoloute class DIV 
    <div>
        <div>
            <div class="fixed">
                Div with fixed position property 
            </div>
</body>
</html>
<html>
    <head>
        <style>
            div {
                background-color: rgb(76, 91, 128);
                padding: 10px;
            }

            div.first {
                opacity: 0.1;
            }
            div.second {
                opacity: 0.3;
            }
            div.third {
                opacity: 0.6;
            }
        </style>
    </head>
    <body>
        
        <h1>The opacity property</h1>

        <p>This is how this property looks:</p>

        <div class="first"><p>opacity 0.1</p></div>
        <div class="second"><p>opacity 0.3</p></div>
        <div class="third"><p>opacity 0.6</p></div>
        <div><p>opacity 1 (defult)</p></div>

    </body>
</html>
